---
# Order Created Topic
# Producer: order-service (OrderService.publishOrderCreatedEvent)
# Consumer: inventory-service (InventoryService.onOrderCreated)
# Consumer: analytics-service (EventConsumerService.handleOrderCreated)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: orders.v1.created
  namespace: workshop-eda
  labels:
    strimzi.io/cluster: my-cluster
    service: order-service
    event-type: order-created
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000  # 7 days
    segment.ms: 86400000     # 1 day
    cleanup.policy: delete
    compression.type: producer
    min.insync.replicas: 2

