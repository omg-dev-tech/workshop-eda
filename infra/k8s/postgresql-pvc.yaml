apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-pvc
  namespace: workshop-eda
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName을 지정하지 않으면 클러스터의 기본 StorageClass 사용
  # OpenShift 환경에 맞게 필요시 수정
  # storageClassName: gp2  # AWS EBS 예시
  # storageClassName: standard  # GCP 예시

