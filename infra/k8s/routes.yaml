---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: web
  namespace: workshop-eda
  labels:
    app: web
spec:
  to:
    kind: Service
    name: web
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: api-gateway
  namespace: workshop-eda
  labels:
    app: api-gateway
spec:
  to:
    kind: Service
    name: api-gateway
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

